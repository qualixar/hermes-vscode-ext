<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent</title>
<style>
  :root {
    --gold: #D4A017; --gold-bright: #FFD700; --gold-dark: #B8860B;
    --amber: #F5A623; --bg: #1A1A1A; --surface: #252525;
    --border: #3A3A3A; --text: #E0E0E0; --dim: #999;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--vscode-font-family, -apple-system, sans-serif);
    font-size: var(--vscode-font-size, 13px);
    color: var(--text); background: var(--bg);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  #header {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: linear-gradient(135deg, #1a1a1a, #2a1f0a);
    border-bottom: 2px solid var(--gold); flex-shrink: 0;
  }
  #header-icon { font-size: 16px; color: var(--gold-bright); }
  #header-title { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: var(--gold-bright); text-transform: uppercase; }
  #header-status { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: #666; }
  #header-status.ok { background: #4CAF50; box-shadow: 0 0 6px rgba(76,175,80,0.5); }
  #tabs {
    display: flex; background: var(--surface); overflow-x: auto;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #tabs button {
    padding: 7px 12px; font-size: 11px; font-weight: 500; letter-spacing: 0.3px;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--dim); cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    white-space: nowrap; flex-shrink: 0;
  }
  #tabs button.active { color: var(--gold-bright); border-bottom-color: var(--gold); background: rgba(212,160,23,0.08); }
  #tabs button:hover { color: var(--text); }
  .tab { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab.active { display: flex; }
  .tab-scroll { flex: 1; overflow-y: auto; padding: 10px; }
  .tab-scroll pre {
    white-space: pre-wrap; font-size: 12px; line-height: 1.6;
    font-family: 'SF Mono', monospace; background: #111;
    padding: 10px; border-radius: 6px; border: 1px solid var(--border);
  }
  .tab-actions {
    display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  /* Chat */
  #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
  .msg {
    margin-bottom: 10px; padding: 10px 12px; border-radius: 8px;
    max-width: 94%; word-wrap: break-word; line-height: 1.55;
  }
  .msg.user { align-self: flex-end; background: linear-gradient(135deg, #B8860B, #8B6914); color: #FFF; box-shadow: 0 1px 4px rgba(184,134,11,0.3); }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .msg pre { background: #111; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; margin: 6px 0; border: 1px solid var(--border); }
  .msg code { font-family: 'SF Mono', monospace; font-size: 12px; background: rgba(212,160,23,0.12); padding: 2px 5px; border-radius: 3px; color: var(--gold-bright); }
  .msg pre code { background: none; padding: 0; color: inherit; }
  .msg img.pasted { max-width: 200px; max-height: 150px; border-radius: 6px; margin: 6px 0; border: 1px solid var(--border); }
  #chat-think { display: none; padding: 6px 12px; font-style: italic; color: var(--gold); font-size: 12px; background: var(--surface); border-top: 1px solid var(--border); }
  #chat-think.on { display: flex; align-items: center; gap: 10px; }
  #chat-usage { display: none; padding: 4px 10px; font-size: 10px; color: var(--dim); border-top: 1px solid var(--border); background: var(--surface); }
  #chat-bar { display: flex; padding: 8px; gap: 6px; border-top: 1px solid var(--border); background: var(--surface); }
  #chat-input {
    flex: 1; resize: none; outline: none; min-height: 34px; max-height: 100px;
    background: #111; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; font-family: inherit; font-size: inherit;
  }
  #chat-input:focus { border-color: var(--gold); }
  #chat-input::placeholder { color: #555; }
  /* Buttons */
  .btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #FFF;
    border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer;
    font-size: 12px; font-weight: 500; letter-spacing: 0.3px;
  }
  .btn:hover { background: linear-gradient(135deg, var(--gold-bright), var(--gold)); }
  .btn:disabled { opacity: 0.4; cursor: default; background: #444; color: #888; }
  .btn-o { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .btn-o:hover { background: rgba(212,160,23,0.1); }
  .btn-r { background: linear-gradient(135deg, #c62828, #8e0000); }
  .btn-r:hover { background: linear-gradient(135deg, #e53935, #b71c1c); }
  .empty { text-align: center; padding: 32px 12px; opacity: 0.4; font-size: 13px; color: var(--dim); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }
</style>
</head>
<body>
<div id="header">
  <span id="header-icon">&#x26A1;</span>
  <span id="header-title">Hermes</span>
  <span id="header-status"></span>
</div>

<div id="tabs">
  <button id="tab-b-chat" class="active">Chat</button>
  <button id="tab-b-config">Config</button>
  <button id="tab-b-gateway">Gateway</button>
  <button id="tab-b-cron">Cron</button>
  <button id="tab-b-mcp">MCP</button>
  <button id="tab-b-skills">Skills</button>
  <button id="tab-b-media">Media</button>
</div>

<!-- CHAT -->
<div id="tab-chat" class="tab active">
  <div id="chat-msgs"><div class="empty" id="chat-empty">Hermes ready.</div></div>
  <div id="chat-think">Thinking...<button class="btn btn-o" style="font-size:10px;padding:3px 8px;margin-left:auto" id="chat-cancel">Cancel</button></div>
  <div id="chat-usage"></div>
  <div id="chat-bar">
    <input type="file" id="img-input" accept="image/*" style="display:none">
    <button class="btn-o" id="img-btn" title="Attach image" style="padding:7px 10px;font-size:14px">&#x1F5BC;</button>
    <textarea id="chat-input" rows="1" placeholder="Not connected. Cmd+Shift+P → Hermes: Connect"></textarea>
    <button class="btn" id="send-btn" disabled>Send</button>
  </div>
</div>

<!-- CONFIG -->
<div id="tab-config" class="tab">
  <div class="tab-scroll" id="cfg-out"><pre>Loading...</pre></div>
  <div class="tab-actions">
    <button class="btn" id="cfg-refresh">Refresh</button>
    <button class="btn btn-o" id="cfg-editor">Open Editor</button>
  </div>
</div>

<!-- GATEWAY -->
<div id="tab-gateway" class="tab">
  <div class="tab-scroll" id="gw-out"><pre>Loading...</pre></div>
  <div class="tab-actions">
    <button class="btn" id="gw-refresh">Refresh</button>
    <button class="btn btn-r" id="gw-restart">Restart</button>
  </div>
</div>

<!-- CRON -->
<div id="tab-cron" class="tab">
  <div class="tab-scroll" id="cron-out"><pre>Loading...</pre></div>
  <div class="tab-actions">
    <button class="btn" id="cron-refresh">Refresh</button>
    <button class="btn" id="cron-add">New Job</button>
  </div>
</div>

<!-- MCP -->
<div id="tab-mcp" class="tab">
  <div class="tab-scroll" id="mcp-out"><pre>Loading...</pre></div>
  <div class="tab-actions">
    <button class="btn" id="mcp-refresh">Refresh</button>
    <button class="btn btn-o" id="mcp-add">Add Server</button>
  </div>
</div>

<!-- SKILLS -->
<div id="tab-skills" class="tab">
  <div class="tab-scroll" id="sk-out"><pre>Loading...</pre></div>
  <div class="tab-actions">
    <button class="btn" id="sk-refresh">Refresh</button>
  </div>
</div>

<!-- MEDIA -->
<div id="tab-media" class="tab">
  <div class="tab-scroll" style="padding:10px">
    <div style="font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;margin-bottom:8px">Generate</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input type="text" id="media-prompt" placeholder="Describe what to create..." style="flex:1;padding:7px 10px;font-size:12px;background:#111;color:var(--text);border:1px solid var(--border);border-radius:6px;font-family:inherit">
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button class="btn" id="media-img">Image</button>
      <button class="btn" id="media-vid">Video</button>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;margin-bottom:8px">Analyze</div>
    <button class="btn btn-o" id="media-analyze">Analyze Image...</button>
  </div>
  <div class="tab-scroll" id="media-result"></div>
</div>

<script>
(function() {
  var vscode = acquireVsCodeApi();
  var msgsEl = document.getElementById('chat-msgs');
  var inpEl = document.getElementById('chat-input');
  var sendBtn = document.getElementById('send-btn');
  var thinkEl = document.getElementById('chat-think');
  var usageEl = document.getElementById('chat-usage');
  var statEl = document.getElementById('header-status');
  var curMsg = null;
  var ping = []; // pending images
  var thinking = false;

  // ── Tab nav ──

  function activateTab(name) {
    var tabs = document.querySelectorAll('.tab');
    var btns = document.querySelectorAll('#tabs button');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
    var t = document.getElementById('tab-' + name);
    var b = document.getElementById('tab-b-' + name);
    if (t) t.classList.add('active');
    if (b) b.classList.add('active');
  }

  // Wire tab buttons
  function tabBtn(id, tabName) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('click', function() {
      activateTab(tabName);
      vscode.postMessage({ command: tabName.charAt(0).toUpperCase() + tabName.slice(1) + 'Load' });
    });
  }
  tabBtn('tab-b-chat', 'chat');
  tabBtn('tab-b-config', 'config');
  tabBtn('tab-b-gateway', 'gateway');
  tabBtn('tab-b-cron', 'cron');
  tabBtn('tab-b-mcp', 'mcp');
  tabBtn('tab-b-skills', 'skills');
  tabBtn('tab-b-media', 'media');

  // ── Action buttons ──

  function wire(id, cmd, extra) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('click', function() {
      var payload = { command: cmd };
      if (extra) {
        if (extra === 'mediaImg') payload.prompt = document.getElementById('media-prompt').value;
        else if (extra === 'mediaVid') payload.prompt = document.getElementById('media-prompt').value;
      }
      vscode.postMessage(payload);
    });
  }
  wire('cfg-refresh', 'configLoad');
  wire('cfg-editor', 'openConfigEditor');
  wire('gw-refresh', 'gatewayLoad');
  wire('gw-restart', 'gatewayRestart');
  wire('cron-refresh', 'cronLoad');
  wire('cron-add', 'cronCreate');
  wire('mcp-refresh', 'mcpLoad');
  wire('mcp-add', 'mcpAdd');
  wire('sk-refresh', 'skillsLoad');
  wire('media-img', 'generateImage', 'mediaImg');
  wire('media-vid', 'generateVideo', 'mediaVid');
  wire('media-analyze', 'analyzeImage');

  // Chat
  sendBtn.addEventListener('click', send);
  inpEl.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  document.getElementById('chat-cancel').addEventListener('click', function() { vscode.postMessage({ command: 'cancel' }); });
  document.getElementById('img-btn').addEventListener('click', function() { document.getElementById('img-input').click(); });
  document.getElementById('img-input').addEventListener('change', function(e) {
    var f = e.target.files && e.target.files[0];
    if (f) readImg(f);
    e.target.value = '';
  });
  inpEl.addEventListener('paste', function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image/') === 0) { e.preventDefault(); readImg(items[i].getAsFile()); }
    }
  });
  inpEl.addEventListener('dragover', function(e) { e.preventDefault(); });
  inpEl.addEventListener('drop', function(e) {
    e.preventDefault();
    var files = e.dataTransfer && e.dataTransfer.files;
    if (!files) return;
    for (var i = 0; i < files.length; i++) { if (files[i].type.indexOf('image/') === 0) readImg(files[i]); }
  });

  function send() {
    var t = inpEl.value.trim();
    if (!t && ping.length === 0) return;
    vscode.postMessage({ command: 'send', text: t, images: ping });
    inpEl.value = ''; ping = [];
  }

  function readImg(f) {
    var r = new FileReader();
    r.onload = function() {
      ping.push(r.result);
      var d = document.createElement('div'); d.className = 'msg user';
      d.innerHTML = '<img class="pasted" src="' + r.result + '">';
      msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
    };
    r.readAsDataURL(f);
  }

  // ── Inbound messages ──

  window.addEventListener('message', function(ev) {
    var m = ev.data;
    var c = m.command;
    if (c === 'connected') { statEl.className = 'ok'; sendBtn.disabled = false; inpEl.placeholder = 'Ask Hermes...'; return; }
    if (c === 'disconnected') { statEl.className = ''; sendBtn.disabled = true; inpEl.placeholder = 'Not connected. Cmd+Shift+P → Hermes: Connect'; return; }
    if (c === 'addMessage') { addMsg(m.role, m.content, m.images); return; }
    if (c === 'appendToken') { appTok(m.token); return; }
    if (c === 'setThinking') {
      thinking = !!m.thinking;
      thinkEl.className = thinking ? 'on' : '';
      sendBtn.disabled = thinking; inpEl.disabled = thinking;
      return;
    }
    if (c === 'clearChat') { msgsEl.innerHTML = '<div class="empty">Cleared.</div>'; curMsg = null; return; }
    if (c === 'setUsage') { usageEl.style.display = 'block'; usageEl.textContent = m.text || ''; return; }
    // Tab responses
    if (c === 'configResult') { document.getElementById('cfg-out').innerHTML = '<pre>' + esc(m.text || '') + '</pre>'; return; }
    if (c === 'gatewayResult') { document.getElementById('gw-out').innerHTML = '<pre>' + esc(m.text || '') + '</pre>'; return; }
    if (c === 'cronResult') { document.getElementById('cron-out').innerHTML = '<pre>' + esc(m.text || '') + '</pre>'; return; }
    if (c === 'mcpResult') { document.getElementById('mcp-out').innerHTML = '<pre>' + esc(m.text || '') + '</pre>'; return; }
    if (c === 'skillsResult') { document.getElementById('sk-out').innerHTML = '<pre>' + esc(m.text || '') + '</pre>'; return; }
    if (c === 'mediaResult') { document.getElementById('media-result').innerHTML = '<pre>' + esc(m.text || '') + '</pre>'; return; }
    if (c === 'error') { vscode.postMessage({ command: 'addMessage', role: 'assistant', content: 'Error: ' + (m.text || '') }); return; }
  });

  function addMsg(role, content, images) {
    var el = document.getElementById('chat-empty'); if (el) el.style.display = 'none';
    curMsg = null;
    var d = document.createElement('div'); d.className = 'msg ' + role;
    if (role === 'assistant') { curMsg = d; d.innerHTML = md(content); }
    else { d.textContent = content; if (images && images.length) { for (var i = 0; i < images.length; i++) { var img = document.createElement('img'); img.className = 'pasted'; img.src = images[i]; d.appendChild(img); } } }
    msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function appTok(tok) {
    var el = document.getElementById('chat-empty'); if (el) el.style.display = 'none';
    if (!curMsg) { curMsg = document.createElement('div'); curMsg.className = 'msg assistant'; msgsEl.appendChild(curMsg); }
    curMsg.textContent += tok;
    curMsg.innerHTML = md(curMsg.textContent);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function md(text) {
    var h = esc(text);
    // Remove USAGE tokens from display
    h = h.replace(/\n?\[USAGE:\{.*?\}\]/g, '');
    h = h.replace(/&#x60;&#x60;&#x60;(\S*)\n?([\s\S]*?)&#x60;&#x60;&#x60;/g, '<pre><code>$2</code></pre>');
    h = h.replace(/&#x60;([^&#x60;]+)&#x60;/g, '<code>$1</code>');
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#D4A017">$1</a>');
    h = h.replace(/\n\n/g, '<br><br>'); h = h.replace(/\n/g, '<br>');
    return h;
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/`/g,'&#x60;'); }

  sendBtn.disabled = true;
})();
</script>
</body>
</html>
